<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <title>Token Notifier</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        min-width: 320px;
        background: Canvas;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
      }

      p {
        margin: 0;
        color: color-mix(in srgb, CanvasText 70%, transparent);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main id="popover-root" aria-label="Token Notifier popover">
      <h1>Token Notifier</h1>
      <p>Tauri shell bootstrapped. Usage graph and rollups arrive in later plan steps.</p>
    </main>
  </body>
</html>
