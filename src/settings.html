<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'none'; img-src 'self' data:; style-src 'self'; script-src 'self'" />
    <title>Token Notifier Settings</title>
    <link rel="stylesheet" href="settings.css" />
    <script type="module" src="settings.js"></script>
  </head>
  <body>
    <main>
      <h1>Settings</h1>
      <form id="settings-form">
        <fieldset>
          <legend>Sources</legend>
          <label><input id="cc-enabled" type="checkbox" /> Claude Code</label>
          <label><input id="cx-enabled" type="checkbox" /> Codex</label>
        </fieldset>
        <fieldset>
          <legend>Alert thresholds</legend>
          <label>CC thresholds <input id="cc-thresholds" placeholder="75,90" /></label>
          <label>CX thresholds <input id="cx-thresholds" placeholder="75,90" /></label>
          <p>Enter 1–3 integers from 1 to 99, separated by commas.</p>
        </fieldset>
        <fieldset>
          <legend>Startup</legend>
          <label><input id="autostart-enabled" type="checkbox" /> Start at login</label>
        </fieldset>
        <button type="submit">Save</button>
        <output id="status" role="status"></output>
      </form>
    </main>
  </body>
</html>
